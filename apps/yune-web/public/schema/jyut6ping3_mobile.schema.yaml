# Rime schema
# encoding: utf-8

__include: template:/

schema:
  schema_id: jyut6ping3_mobile
  name: 粵語拼音
  dependencies:
    - luna_pinyin

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - affix_segmentor@luna_pinyin
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
    - script_translator@luna_pinyin
  filters:
    - dictionary_lookup_filter
    - simplifier
    - simplifier@variants_hk
    - simplifier@trad_tw

menu:
  __patch: include:/no_candidate_selection

translator:
  prism: jyut6ping3_mobile
  load_lookup_records: false
  __patch: include:/letter_to_tone
  enable_completion: true
  enable_correction: false
  enable_sentence: true
  enable_user_dict: true
  encode_commit_history: true
  combine_candidates: true
  prediction_candidate_limit: 1
  prefix_fallback: true
  prediction_never_first: true
  prediction_weight_threshold: 0
  dictionary_exclude: []

simplifier:
  option_name: simplification
  opencc_config: t2s.json

variants_hk:
  option_name: variants_hk
  opencc_config: t2hkf.json

trad_tw:
  option_name: trad_tw
  opencc_config: t2tw.json

luna_pinyin:
  tag: luna_pinyin
  dictionary: luna_pinyin_yune_reverse
  enable_sentence: false
  enable_user_dict: false
  encode_commit_history: false
  always_show_comments: true
  prefix: "`"
  suffix: ";"
  tips: 〔普通話〕
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/
  comment_format:
    - xform/^/\v/

recognizer:
  import_preset: default
  patterns:
    luna_pinyin: "^`[a-z']*;?$"

__patch:
  []

name: Deploy yune-web

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: yune-web-pages
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Build and deploy yune-web
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build public demo
        run: sh apps/yune-web/public-demo/cloudflare-pages-build.sh

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/yune-web/public-demo/dist --project-name=yune-web --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

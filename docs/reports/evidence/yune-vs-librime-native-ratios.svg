<svg xmlns="http://www.w3.org/2000/svg" width="760" height="480" viewBox="0 0 760 480" role="img" aria-labelledby="t d">
  <title id="t">Yune vs upstream librime 1.17.0 — native same-run latency ratios</title>
  <desc id="d">Horizontal bars of Yune median latency divided by librime median latency, per benchmark row. Lower is better; 1.0x equals librime. Yune is faster on seven rows including both abbreviation rows, and slower on the three sub-100-microsecond short-key rows.</desc>
  <rect width="760" height="480" fill="#f8fafc"/>
  <text x="28" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Yune vs librime 1.17.0 — native latency (honest standing)</text>
  <text x="28" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">Same-run median ratio (Yune / librime). Lower is better; dashed line is 1.0x = librime parity. M45 final evidence.</text>

  <line x1="248" y1="82" x2="248" y2="388" stroke="#0f766e" stroke-width="2" stroke-dasharray="5 5"/>
  <text x="252" y="94" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#0f766e">1.0x librime</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="13">
    <text x="84" y="118" text-anchor="end" fill="#111827">zhongguo</text>
    <rect x="90" y="106" width="59" height="16" rx="3" fill="#16a34a"/>
    <text x="155" y="119" fill="#475569">0.37x faster</text>

    <text x="84" y="146" text-anchor="end" fill="#111827">cszysmsrsd *</text>
    <rect x="90" y="134" width="70" height="16" rx="3" fill="#16a34a"/>
    <text x="166" y="147" fill="#475569">0.44x faster</text>

    <text x="84" y="174" text-anchor="end" fill="#111827">zybfshmsru *</text>
    <rect x="90" y="162" width="101" height="16" rx="3" fill="#16a34a"/>
    <text x="197" y="175" fill="#475569">0.64x faster</text>

    <text x="84" y="202" text-anchor="end" fill="#111827">59-char pinyin</text>
    <rect x="90" y="190" width="114" height="16" rx="3" fill="#16a34a"/>
    <text x="210" y="203" fill="#475569">0.72x faster</text>

    <text x="84" y="230" text-anchor="end" fill="#111827">startup</text>
    <rect x="90" y="218" width="138" height="16" rx="3" fill="#16a34a"/>
    <text x="234" y="231" fill="#475569">0.88x faster</text>

    <text x="84" y="258" text-anchor="end" fill="#111827">session</text>
    <rect x="90" y="246" width="146" height="16" rx="3" fill="#16a34a"/>
    <text x="242" y="259" fill="#475569">0.92x faster</text>

    <text x="84" y="286" text-anchor="end" fill="#111827">37-char pinyin</text>
    <rect x="90" y="274" width="148" height="16" rx="3" fill="#16a34a"/>
    <text x="244" y="287" fill="#475569">0.94x faster</text>

    <text x="84" y="314" text-anchor="end" fill="#111827">hao</text>
    <rect x="90" y="302" width="347" height="16" rx="3" fill="#dc2626"/>
    <text x="443" y="315" fill="#475569">~2.2x slower</text>

    <text x="84" y="342" text-anchor="end" fill="#111827">n</text>
    <rect x="90" y="330" width="558" height="16" rx="3" fill="#dc2626"/>
    <text x="654" y="343" fill="#475569">~3.5x slower</text>

    <text x="84" y="370" text-anchor="end" fill="#111827">ni</text>
    <rect x="90" y="358" width="584" height="16" rx="3" fill="#dc2626"/>
    <text x="680" y="371" fill="#475569">~3.7x slower</text>
  </g>

  <text x="28" y="416" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#334155">* Abbreviation rows: Yune matches librime candidate output byte-for-byte AND is faster. Candidate output matches on every row.</text>
  <text x="28" y="436" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#334155">The 3 slower rows (hao/n/ni) are single-character inputs of 24-69 microseconds: a higher constant factor, but imperceptible while typing. Ratios vary a few % run-to-run.</text>
  <text x="28" y="460" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#b91c1c">Memory is the honest gap on this fair luna_pinyin comparison: Yune ~127 MB native peak vs librime ~13-17 MB. (Jyutping is heavier but not like-for-like.)</text>
</svg>

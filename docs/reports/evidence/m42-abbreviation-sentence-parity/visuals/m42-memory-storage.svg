<svg xmlns="http://www.w3.org/2000/svg" width="980" height="440" viewBox="0 0 980 440" role="img" aria-labelledby="title desc">
  <title id="title">M42 memory and storage status</title>
  <desc id="desc">Bar chart and status cards showing M42 Track A memory, M40 no-regression guard, approximate librime observed memory, and storage guard evidence.</desc>
  <rect width="980" height="440" fill="#f8fafc"/>
  <text x="40" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">M42 memory and storage guard</text>
  <text x="40" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">M42 avoids a Track A memory regression, but whole-process memory remains the largest absolute gap versus librime.</text>

  <text x="40" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">librime observed upper row peak</text>
  <rect x="280" y="94" width="68" height="20" rx="4" fill="#94a3b8"/>
  <text x="360" y="109" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334155">about 13-17 MB</text>

  <text x="40" y="153" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">M42 Track A peak</text>
  <rect x="280" y="139" width="479" height="20" rx="4" fill="#16a34a"/>
  <text x="772" y="154" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#166534">119,775,232 B</text>

  <text x="40" y="198" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">M40 Track A peak</text>
  <rect x="280" y="184" width="496" height="20" rx="4" fill="#2563eb"/>
  <text x="789" y="199" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1e3a8a">123,957,248 B</text>

  <text x="40" y="243" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">M40 +5% guard max</text>
  <rect x="280" y="229" width="521" height="20" rx="4" fill="#f59e0b"/>
  <text x="814" y="244" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#92400e">130,155,110 B</text>

  <rect x="40" y="285" width="420" height="110" rx="6" fill="#ecfdf5" stroke="#86efac"/>
  <text x="62" y="314" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#166534">Track A storage still active</text>
  <text x="62" y="340" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#14532d">selected_storage = rsmarisa_byte_backed</text>
  <text x="62" y="362" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#14532d">table/prism = mmap, selected heap mirrors = 0</text>
  <text x="62" y="384" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#14532d">source_fallback = false, positive rsmarisa counters</text>

  <rect x="500" y="285" width="440" height="110" rx="6" fill="#fff7ed" stroke="#fdba74"/>
  <text x="522" y="314" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#9a3412">Next memory work</text>
  <text x="522" y="340" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#7c2d12">Track A is under the no-regression guard, not memory-parity.</text>
  <text x="522" y="362" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#7c2d12">Run a heap-owner profile before changing storage again.</text>
  <text x="522" y="384" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#7c2d12">Track B guard peak remains 504,901,632 B.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">Cross-milestone performance gains through M42</title>
  <desc id="desc">Summary chart of first-tracked to current performance gains across native startup, session, short and medium pinyin rows, long pinyin rows, and separately measured browser startup rows.</desc>
  <rect width="980" height="620" fill="#f8fafc"/>
  <text x="40" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Performance gain across the development history</text>
  <text x="40" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">Milestone snapshots, not one same-run benchmark: M33/M39/M41 first tracked rows compared with the current M42 or M41 closeout.</text>

  <rect x="40" y="92" width="900" height="34" rx="4" fill="#e2e8f0"/>
  <text x="62" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#334155">Dimension</text>
  <text x="272" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#334155">First tracked</text>
  <text x="418" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#334155">Current</text>
  <text x="548" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#334155">Reduction</text>
  <text x="730" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#334155">Gain</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">
    <text x="62" y="153">native startup/runtime-ready</text>
    <text x="272" y="153">M33 47.788 ms</text>
    <text x="418" y="153">M42 23.856 ms</text>
    <rect x="548" y="139" width="175" height="18" rx="4" fill="#2563eb"/>
    <text x="734" y="153" fill="#1e3a8a">50.1%, 2.00x faster</text>

    <text x="62" y="198">native session lifecycle</text>
    <text x="272" y="198">M33 47.814 ms</text>
    <text x="418" y="198">M42 23.777 ms</text>
    <rect x="548" y="184" width="176" height="18" rx="4" fill="#2563eb"/>
    <text x="734" y="198" fill="#1e3a8a">50.3%, 2.01x faster</text>

    <text x="62" y="243">hao first page</text>
    <text x="272" y="243">M33 4,154.467 us</text>
    <text x="418" y="243">M42 38.800 us</text>
    <rect x="548" y="229" width="347" height="18" rx="4" fill="#16a34a"/>
    <text x="734" y="243" fill="#14532d">99.1%, 107.07x faster</text>

    <text x="62" y="288">ni first page</text>
    <text x="272" y="288">M33 3,032.250 us</text>
    <text x="418" y="288">M42 57.150 us</text>
    <rect x="548" y="274" width="343" height="18" rx="4" fill="#16a34a"/>
    <text x="734" y="288" fill="#14532d">98.1%, 53.06x faster</text>

    <text x="62" y="333">zhongguo medium row</text>
    <text x="272" y="333">M33 4,696.538 us</text>
    <text x="418" y="333">M42 60.188 us</text>
    <rect x="548" y="319" width="345" height="18" rx="4" fill="#16a34a"/>
    <text x="734" y="333" fill="#14532d">98.7%, 78.03x faster</text>

    <text x="62" y="378">37-char full pinyin</text>
    <text x="272" y="378">M39 514.903 us</text>
    <text x="418" y="378">M42 278.438 us</text>
    <rect x="548" y="364" width="161" height="18" rx="4" fill="#0f766e"/>
    <text x="734" y="378" fill="#0f766e">45.9%, 1.85x faster</text>

    <text x="62" y="423">59-char full pinyin</text>
    <text x="272" y="423">M39 917.961 us</text>
    <text x="418" y="423">M42 474.683 us</text>
    <rect x="548" y="409" width="169" height="18" rx="4" fill="#0f766e"/>
    <text x="734" y="423" fill="#0f766e">48.3%, 1.93x faster</text>

    <text x="62" y="468">browser luna cold ready</text>
    <text x="272" y="468">M41 phase 0 3,115 ms</text>
    <text x="418" y="468">M41 final 846 ms</text>
    <rect x="548" y="454" width="255" height="18" rx="4" fill="#7c3aed"/>
    <text x="734" y="468" fill="#5b21b6">72.8%, 3.68x faster</text>

    <text x="62" y="513">browser jyut cold ready</text>
    <text x="272" y="513">M41 phase 0 17,041 ms</text>
    <text x="418" y="513">M41 final 1,254 ms</text>
    <rect x="548" y="499" width="324" height="18" rx="4" fill="#7c3aed"/>
    <text x="734" y="513" fill="#5b21b6">92.6%, 13.59x faster</text>
  </g>

  <text x="40" y="570" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">Native values are engine rows; browser values are M41 real-browser rows and must stay separate from native librime ratios.</text>
</svg>

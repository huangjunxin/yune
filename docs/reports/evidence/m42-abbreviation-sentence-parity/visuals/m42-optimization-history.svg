<svg xmlns="http://www.w3.org/2000/svg" width="980" height="640" viewBox="0 0 980 640" role="img" aria-labelledby="title desc">
  <title id="title">Optimization approaches used through M42</title>
  <desc id="desc">Timeline showing the main optimization approaches from M33 through M42 and the lesson each approach contributes to the next performance pass.</desc>
  <rect width="980" height="640" fill="#f8fafc"/>
  <text x="40" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Optimization approaches used so far</text>
  <text x="40" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">Pattern: compare fairly, bound materialization, activate storage with counters, index the real owner, then preserve the gates.</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <line x1="84" y1="112" x2="84" y2="570" stroke="#94a3b8" stroke-width="2"/>

    <circle cx="84" cy="118" r="8" fill="#2563eb"/>
    <text x="110" y="123" font-size="14" font-weight="700" fill="#111827">M33 - fair native comparison</text>
    <text x="110" y="145" font-size="13" fill="#475569">Lazy-load unrelated dictionaries and share immutable built translators before claiming a speed gap.</text>

    <circle cx="84" cy="172" r="8" fill="#2563eb"/>
    <text x="110" y="177" font-size="14" font-weight="700" fill="#111827">M34 - page-bounded candidate pipeline</text>
    <text x="110" y="199" font-size="13" fill="#475569">Stop first-page requests from materializing full candidate lists unless a reader truly needs them.</text>

    <circle cx="84" cy="226" r="8" fill="#2563eb"/>
    <text x="110" y="231" font-size="14" font-weight="700" fill="#111827">M35 - compact table and prism access</text>
    <text x="110" y="253" font-size="13" fill="#475569">Move safe Track A lookup payloads toward compact byte-backed access; defer broad string rewrites.</text>

    <circle cx="84" cy="280" r="8" fill="#64748b"/>
    <text x="110" y="285" font-size="14" font-weight="700" fill="#111827">M36 - product-path no-go discipline</text>
    <text x="110" y="307" font-size="13" fill="#475569">Regenerate or reject stale profile artifacts instead of forcing an unsupported faster path.</text>

    <circle cx="84" cy="334" r="8" fill="#16a34a"/>
    <text x="110" y="339" font-size="14" font-weight="700" fill="#111827">M37/M38 - mmap and rsmarisa with counters</text>
    <text x="110" y="361" font-size="13" fill="#475569">Count storage wins only when selected storage, mmap status, zero heap mirrors, and positive probes prove use.</text>

    <circle cx="84" cy="388" r="8" fill="#16a34a"/>
    <text x="110" y="393" font-size="14" font-weight="700" fill="#111827">M39 - long-row owner attribution</text>
    <text x="110" y="415" font-size="13" fill="#475569">Add long continuous pinyin and Track B guard rows; isolate all-substrings sentence lookup as the Track A owner.</text>

    <circle cx="84" cy="442" r="8" fill="#16a34a"/>
    <text x="110" y="447" font-size="14" font-weight="700" fill="#111827">M40 - compiled sentence lookup index</text>
    <text x="110" y="469" font-size="13" fill="#475569">Combine exact ranges, reachable starts, prefix filtering, and phrase-index walks without heap mirrors.</text>

    <circle cx="84" cy="496" r="8" fill="#64748b"/>
    <text x="110" y="501" font-size="14" font-weight="700" fill="#111827">M41 - browser lane kept separate</text>
    <text x="110" y="523" font-size="13" fill="#475569">Close yune-web startup only with rebuilt runtime and real-browser evidence, not native microbenchmarks.</text>

    <circle cx="84" cy="550" r="8" fill="#dc2626"/>
    <text x="110" y="555" font-size="14" font-weight="700" fill="#111827">M42 - abbreviation behavior parity</text>
    <text x="110" y="577" font-size="13" fill="#475569">Use captured upstream output first, add bounded code-span routing, then record abbreviation latency as a blocker.</text>
  </g>

  <rect x="640" y="110" width="300" height="132" rx="8" fill="#ecfdf5" stroke="#86efac"/>
  <text x="664" y="139" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#166534">Closed gains</text>
  <text x="664" y="165" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#14532d">Startup/session under librime</text>
  <text x="664" y="187" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#14532d">Full-pinyin long rows 0.957x and 0.721x</text>
  <text x="664" y="209" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#14532d">rsmarisa/mmap active, heap mirrors zero</text>

  <rect x="640" y="272" width="300" height="132" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text x="664" y="301" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#9a3412">Current blockers</text>
  <text x="664" y="327" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#7c2d12">Whole-process memory vs librime</text>
  <text x="664" y="349" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#7c2d12">Abbreviation code-span graph latency</text>
  <text x="664" y="371" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#7c2d12">Short-key fixed overhead only if target tightens</text>

  <rect x="640" y="434" width="300" height="132" rx="8" fill="#e0f2fe" stroke="#7dd3fc"/>
  <text x="664" y="463" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#075985">Next-pass rule</text>
  <text x="664" y="489" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#075985">Start with fresh owner evidence.</text>
  <text x="664" y="511" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#075985">Do not reopen closed long-row paths.</text>
  <text x="664" y="533" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#075985">Keep native and browser claims separate.</text>
</svg>

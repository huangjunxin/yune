<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="640" viewBox="0 0 1080 640" role="img" aria-labelledby="title desc">
  <title id="title">M42 README comparison of Yune native performance versus upstream librime</title>
  <desc id="desc">Summary chart comparing Yune native M42 same-run ratios against upstream librime 1.17.0, with faster rows, slower rows, abbreviation blockers, and memory caveat.</desc>
  <rect width="1080" height="640" fill="#f8fafc"/>

  <text x="42" y="46" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">Yune vs upstream librime 1.17.0 - native M42 snapshot</text>
  <text x="42" y="74" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">Same-machine native Track A rows. Lower latency ratio is better; 1.0x is librime parity. Memory is shown separately because it is not latency.</text>

  <text x="42" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Latency ratio</text>
  <text x="42" y="134" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">Green/blue bars are faster than librime; amber/red bars are slower and remain future optimization targets.</text>

  <line x1="395" x2="395" y1="154" y2="448" stroke="#64748b" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="377" y="149" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">1.0x</text>
  <line x1="855" x2="855" y1="154" y2="448" stroke="#b45309" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="829" y="149" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#92400e">5.0x guard</text>

  <text x="42" y="174" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">zhongguo</text>
  <rect x="280" y="160" width="42" height="18" rx="4" fill="#16a34a"/>
  <text x="332" y="174" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#166534">0.363x</text>

  <text x="42" y="207" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">59-char full pinyin</text>
  <rect x="280" y="193" width="83" height="18" rx="4" fill="#16a34a"/>
  <text x="373" y="207" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#166534">0.721x</text>

  <text x="42" y="240" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">startup/runtime-ready</text>
  <rect x="280" y="226" width="87" height="18" rx="4" fill="#2563eb"/>
  <text x="377" y="240" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1e3a8a">0.759x</text>

  <text x="42" y="273" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">session create/select/destroy</text>
  <rect x="280" y="259" width="98" height="18" rx="4" fill="#2563eb"/>
  <text x="388" y="273" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1e3a8a">0.856x</text>

  <text x="42" y="306" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">37-char full pinyin</text>
  <rect x="280" y="292" width="110" height="18" rx="4" fill="#16a34a"/>
  <text x="400" y="306" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#166534">0.957x</text>

  <text x="42" y="339" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">hao</text>
  <rect x="280" y="325" width="394" height="18" rx="4" fill="#d97706"/>
  <text x="684" y="339" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#92400e">3.424x</text>

  <text x="42" y="372" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">cszysmsrsd</text>
  <rect x="280" y="358" width="399" height="18" rx="4" fill="#dc2626"/>
  <text x="689" y="372" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#991b1b">3.469x behavior fixed, slower</text>

  <text x="42" y="405" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">ni</text>
  <rect x="280" y="391" width="469" height="18" rx="4" fill="#d97706"/>
  <text x="759" y="405" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#92400e">4.082x</text>

  <text x="42" y="438" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">zybfshmsru</text>
  <rect x="280" y="424" width="583" height="18" rx="4" fill="#dc2626"/>
  <text x="873" y="438" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#991b1b">5.069x blocker</text>

  <rect x="42" y="482" width="470" height="114" rx="8" fill="#ecfdf5" stroke="#86efac"/>
  <text x="64" y="513" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#166534">Where Yune is strong today</text>
  <text x="64" y="540" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#14532d">Startup/session are below same-run librime, and both long</text>
  <text x="64" y="562" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#14532d">full-pinyin stress rows are at parity or faster after M40.</text>
  <text x="64" y="584" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#14532d">Track B and browser startup use separate evidence lanes.</text>

  <rect x="542" y="482" width="496" height="114" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text x="564" y="513" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#9a3412">Where Yune still trails</text>
  <text x="564" y="540" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#7c2d12">Short keys still carry fixed overhead, and M42 abbreviation rows</text>
  <text x="564" y="562" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#7c2d12">match output but are slower. Track A peak is 119,775,232 B;</text>
  <text x="564" y="584" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#7c2d12">librime observed rows are roughly 13-17 MB, so memory is not parity.</text>
</svg>

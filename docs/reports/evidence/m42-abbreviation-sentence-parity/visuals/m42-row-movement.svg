<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">M40 to M42 native row movement</title>
  <desc id="desc">Table-style visualization comparing M40 final Yune rows with M42 final Yune rows, including long-row gains and abbreviation behavior correction.</desc>
  <rect width="980" height="430" fill="#f8fafc"/>
  <text x="40" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">M40 to M42 native movement</text>
  <text x="40" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">M42 protects the M40 full-pinyin gains and turns two invalid fast exits into behavior-comparable rows.</text>

  <rect x="40" y="92" width="900" height="34" rx="4" fill="#e2e8f0"/>
  <text x="62" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#334155">Dimension</text>
  <text x="330" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#334155">M40 final</text>
  <text x="520" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#334155">M42 final</text>
  <text x="720" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#334155">Outcome</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">
    <text x="62" y="153">startup/runtime-ready</text>
    <text x="330" y="153">23.934 ms</text>
    <text x="520" y="153">23.856 ms</text>
    <text x="720" y="153" fill="#166534">stable, 0.759x librime</text>

    <text x="62" y="188">session lifecycle</text>
    <text x="330" y="188">23.994 ms</text>
    <text x="520" y="188">23.777 ms</text>
    <text x="720" y="188" fill="#166534">stable, 0.856x librime</text>

    <text x="62" y="223">37-char full pinyin</text>
    <text x="330" y="223">289.914 us</text>
    <text x="520" y="223">278.438 us</text>
    <text x="720" y="223" fill="#166534">4.0% faster, 0.957x</text>

    <text x="62" y="258">59-char full pinyin</text>
    <text x="330" y="258">494.017 us</text>
    <text x="520" y="258">474.683 us</text>
    <text x="720" y="258" fill="#166534">3.9% faster, 0.721x</text>

    <text x="62" y="293">Track B 50+ guard</text>
    <text x="330" y="293">196.387 us median</text>
    <text x="520" y="293">186.513 us median</text>
    <text x="720" y="293" fill="#334155">guard only, no speed claim</text>

    <text x="62" y="328">cszysmsrsd</text>
    <text x="330" y="328">24.820 us, 0 candidates</text>
    <text x="520" y="328">4,127.580 us, matches oracle</text>
    <text x="720" y="328" fill="#991b1b">behavior fixed, latency blocker</text>

    <text x="62" y="363">zybfshmsru</text>
    <text x="330" y="363">26.350 us, 0 candidates</text>
    <text x="520" y="363">4,257.100 us, matches oracle</text>
    <text x="720" y="363" fill="#991b1b">behavior fixed, latency blocker</text>
  </g>

  <line x1="40" x2="940" y1="132" y2="132" stroke="#cbd5e1"/>
  <line x1="40" x2="940" y1="167" y2="167" stroke="#e2e8f0"/>
  <line x1="40" x2="940" y1="202" y2="202" stroke="#e2e8f0"/>
  <line x1="40" x2="940" y1="237" y2="237" stroke="#e2e8f0"/>
  <line x1="40" x2="940" y1="272" y2="272" stroke="#e2e8f0"/>
  <line x1="40" x2="940" y1="307" y2="307" stroke="#e2e8f0"/>
  <line x1="40" x2="940" y1="342" y2="342" stroke="#e2e8f0"/>
</svg>

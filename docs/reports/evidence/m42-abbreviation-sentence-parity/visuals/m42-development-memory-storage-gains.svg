<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Memory and storage gains through M42</title>
  <desc id="desc">Visualization of Track A and Track B memory reductions and storage guard evolution from earlier milestone snapshots through M42.</desc>
  <rect width="980" height="520" fill="#f8fafc"/>
  <text x="40" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Memory and storage gains through M42</text>
  <text x="40" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">Memory improved materially, but whole-process memory remains the top absolute gap versus librime.</text>

  <text x="40" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Track A peak working set</text>
  <text x="40" y="138" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">M33 after-low-risk: 182,775,808 B</text>
  <rect x="260" y="124" width="520" height="20" rx="4" fill="#94a3b8"/>
  <text x="794" y="139" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334155">182.8 MB</text>
  <text x="40" y="172" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">M42 final: 119,775,232 B</text>
  <rect x="260" y="158" width="341" height="20" rx="4" fill="#16a34a"/>
  <text x="615" y="173" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#166534">119.8 MB, 34.5% lower</text>

  <text x="40" y="232" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Track B product / guard peak</text>
  <text x="40" y="258" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">M36 product path: 928,350,208 B</text>
  <rect x="260" y="244" width="520" height="20" rx="4" fill="#94a3b8"/>
  <text x="794" y="259" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334155">928.4 MB</text>
  <text x="40" y="292" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">M42 guard: 504,901,632 B</text>
  <rect x="260" y="278" width="283" height="20" rx="4" fill="#0f766e"/>
  <text x="557" y="293" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#0f766e">504.9 MB, 45.6% lower</text>

  <rect x="40" y="338" width="205" height="112" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="62" y="366" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#1e3a8a">M37</text>
  <text x="62" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#1e40af">Product table bytes moved to mapped storage.</text>
  <text x="62" y="412" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#1e40af">Track B peak cut from 928 MB to 504 MB.</text>

  <rect x="268" y="338" width="205" height="112" rx="8" fill="#ecfdf5" stroke="#86efac"/>
  <text x="290" y="366" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">M38</text>
  <text x="290" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#14532d">Track A selected storage became rsmarisa_byte_backed.</text>
  <text x="290" y="412" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#14532d">Table and prism heap mirrors stayed zero.</text>

  <rect x="496" y="338" width="205" height="112" rx="8" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="518" y="366" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#155e75">M40</text>
  <text x="518" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#155e75">Sentence index stayed numeric and range-shaped.</text>
  <text x="518" y="412" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#155e75">No trie-shaped heap mirror was added.</text>

  <rect x="724" y="338" width="216" height="112" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text x="746" y="366" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#9a3412">M42</text>
  <text x="746" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#7c2d12">Abbreviation vocabulary is target-scoped.</text>
  <text x="746" y="412" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#7c2d12">Memory passes guard; parity is still not claimed.</text>

  <text x="40" y="484" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">Next memory work should profile heap owners before touching storage again: string duplication, sentence model entries, userdb, and Track B duplicated dictionary state are hypotheses, not accepted fixes yet.</text>
</svg>

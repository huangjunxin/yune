<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">M42 same-run native ratios versus upstream librime</title>
  <desc id="desc">Bar chart showing M42 same-run Yune-to-librime native ratios across startup, session, short keys, medium and long pinyin rows, and abbreviation rows.</desc>
  <rect width="980" height="500" fill="#f8fafc"/>
  <text x="40" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">M42 native same-run ratios vs upstream librime</text>
  <text x="40" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">Lower is better. Full-pinyin long rows are at or faster than librime; abbreviation rows are behavior-correct but still slow.</text>
  <line x1="390" x2="390" y1="92" y2="414" stroke="#64748b" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="372" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">1.0x</text>
  <line x1="830" x2="830" y1="92" y2="414" stroke="#b45309" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="812" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#92400e">5.0x guard</text>

  <text x="40" y="113" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">startup/runtime-ready</text>
  <rect x="280" y="100" width="83.5" height="18" rx="4" fill="#2563eb"/>
  <text x="371" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1e3a8a">0.759x</text>

  <text x="40" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">session create/select/destroy</text>
  <rect x="280" y="135" width="94.2" height="18" rx="4" fill="#2563eb"/>
  <text x="383" y="149" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#1e3a8a">0.856x</text>

  <text x="40" y="183" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">zhongguo</text>
  <rect x="280" y="170" width="39.9" height="18" rx="4" fill="#16a34a"/>
  <text x="328" y="184" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#166534">0.363x</text>

  <text x="40" y="218" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">37-char full pinyin</text>
  <rect x="280" y="205" width="105.3" height="18" rx="4" fill="#16a34a"/>
  <text x="394" y="219" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#166534">0.957x</text>

  <text x="40" y="253" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">59-char full pinyin</text>
  <rect x="280" y="240" width="79.3" height="18" rx="4" fill="#16a34a"/>
  <text x="368" y="254" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#166534">0.721x</text>

  <text x="40" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">hao</text>
  <rect x="280" y="275" width="376.6" height="18" rx="4" fill="#d97706"/>
  <text x="665" y="289" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#92400e">3.424x</text>

  <text x="40" y="323" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">ni</text>
  <rect x="280" y="310" width="449.0" height="18" rx="4" fill="#d97706"/>
  <text x="738" y="324" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#92400e">4.082x</text>

  <text x="40" y="358" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">cszysmsrsd</text>
  <rect x="280" y="345" width="381.6" height="18" rx="4" fill="#dc2626"/>
  <text x="670" y="359" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#991b1b">3.469x blocker</text>

  <text x="40" y="393" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">zybfshmsru</text>
  <rect x="280" y="380" width="557.6" height="18" rx="4" fill="#dc2626"/>
  <text x="846" y="394" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#991b1b">5.069x blocker</text>

  <rect x="40" y="434" width="900" height="34" rx="6" fill="#e2e8f0"/>
  <text x="58" y="456" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334155">Current read: startup/session and full-pinyin long rows are inside native guards; short keys remain guarded fixed overhead; abbreviation behavior is fixed but latency is the next owner.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Post-M42 bottleneck map</title>
  <desc id="desc">Ranked post-M42 bottleneck map showing memory, abbreviation sentence latency, Track B guard work, short-key fixed overhead, and browser work as a separate lane.</desc>
  <rect width="980" height="560" fill="#f8fafc"/>
  <text x="40" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Post-M42 bottleneck map</text>
  <text x="40" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">The next optimization pass should start from measured owners, not from the old M40 zero-candidate rows.</text>

  <rect x="40" y="100" width="420" height="96" rx="8" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="62" y="128" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#7f1d1d">1. Whole-process memory</text>
  <text x="62" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#7f1d1d">Track A peak is 119,775,232 B; librime rows are about 13-17 MB.</text>
  <text x="62" y="174" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#7f1d1d">Next step: heap-owner profile before another storage rewrite.</text>

  <rect x="520" y="100" width="420" height="96" rx="8" fill="#ffedd5" stroke="#fdba74"/>
  <text x="542" y="128" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#9a3412">2. Abbreviation sentence latency</text>
  <text x="542" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#7c2d12">cszysmsrsd: 3.469x; zybfshmsru: 5.069x same-run librime.</text>
  <text x="542" y="174" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#7c2d12">Owner: code-span graph and phrase selection, not candidate output.</text>

  <rect x="40" y="226" width="420" height="96" rx="8" fill="#e0f2fe" stroke="#7dd3fc"/>
  <text x="62" y="254" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#075985">3. Track B profile guard</text>
  <text x="62" y="278" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#075985">50+ jyut6ping3_mobile row: 186.513 us median, 204.680 us p95.</text>
  <text x="62" y="300" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#075985">Guard only; open a TypeDuck-profile plan only for a named row.</text>

  <rect x="520" y="226" width="420" height="96" rx="8" fill="#fef9c3" stroke="#fde047"/>
  <text x="542" y="254" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#854d0e">4. Track A short-key fixed overhead</text>
  <text x="542" y="278" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#713f12">hao: 38.800 us, 3.424x; ni: 57.150 us, 4.082x.</text>
  <text x="542" y="300" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#713f12">Owner is translator fixed overhead; defer unless stricter target appears.</text>

  <rect x="40" y="352" width="900" height="96" rx="8" fill="#e2e8f0" stroke="#cbd5e1"/>
  <text x="62" y="380" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Separate lane: browser and product speed</text>
  <text x="62" y="404" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334155">M41 closed yune-web startup separately with real-browser evidence: luna_pinyin 846 ms, jyut6ping3_mobile 1,254 ms cold ready-to-input.</text>
  <text x="62" y="426" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#334155">Do not use native M42 rows as public-demo, browser, packaging, or delivery speed claims.</text>

  <rect x="40" y="482" width="900" height="40" rx="6" fill="#ecfdf5"/>
  <text x="62" y="507" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#14532d">Closed native wins to preserve: startup/session, zhongguo, both full-pinyin long rows, rsmarisa/mmap/zero-heap-mirror storage, bounded output, and Track B guard evidence.</text>
</svg>

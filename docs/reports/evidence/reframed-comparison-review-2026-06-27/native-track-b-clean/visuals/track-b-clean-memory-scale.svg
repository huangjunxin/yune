<svg xmlns="http://www.w3.org/2000/svg" width="900" height="390" viewBox="0 0 900 390" role="img" aria-labelledby="title desc">
  <title id="title">Clean Track B post-M46 memory scale</title>
  <desc id="desc">Clean byte-backed Track B still has process-scale memory: peak pagefile 536.3 MB, peak working set 504.7 MB, steady resident 427.2 to 440.7 MB, while named rows are much smaller.</desc>
  <rect width="900" height="390" fill="#f8fafc"/>
  <text x="36" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Post-M46 clean Track B memory scale</text>
  <text x="36" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">Native rerun with -DeployProductBeforeBenchmark; byte_backed + mmap; source_fallback=false</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#64748b">
    <line x1="250" y1="102" x2="250" y2="306" stroke="#cbd5e1"/>
    <line x1="355" y1="102" x2="355" y2="306" stroke="#e2e8f0"/>
    <line x1="461" y1="102" x2="461" y2="306" stroke="#e2e8f0"/>
    <line x1="566" y1="102" x2="566" y2="306" stroke="#e2e8f0"/>
    <line x1="672" y1="102" x2="672" y2="306" stroke="#e2e8f0"/>
    <line x1="777" y1="102" x2="777" y2="306" stroke="#e2e8f0"/>
    <text x="246" y="322">0</text>
    <text x="342" y="322">100</text>
    <text x="448" y="322">200</text>
    <text x="553" y="322">300</text>
    <text x="659" y="322">400</text>
    <text x="764" y="322">500 MB</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="13">
    <text x="42" y="126" fill="#111827">peak pagefile proxy</text>
    <rect x="250" y="109" width="566" height="22" rx="4" fill="#ea580c"/>
    <text x="826" y="126" text-anchor="end" font-weight="700" fill="#111827">536.3 MB</text>

    <text x="42" y="164" fill="#111827">peak working set</text>
    <rect x="250" y="147" width="533" height="22" rx="4" fill="#dc2626"/>
    <text x="794" y="164" text-anchor="end" font-weight="700" fill="#111827">504.7 MB</text>

    <text x="42" y="202" fill="#111827">steady resident high row</text>
    <rect x="250" y="185" width="465" height="22" rx="4" fill="#2563eb"/>
    <text x="730" y="202" font-weight="700" fill="#111827">440.7 MB</text>
    <text x="732" y="218" font-size="12" fill="#475569">band starts at 427.2 MB</text>

    <text x="42" y="240" fill="#111827">private bytes proxy</text>
    <rect x="250" y="223" width="445" height="22" rx="4" fill="#0f766e"/>
    <text x="710" y="240" font-weight="700" fill="#111827">421.6 MB</text>

    <text x="42" y="278" fill="#111827">named rows, mixed classes</text>
    <rect x="250" y="261" width="66" height="22" rx="4" fill="#7c3aed"/>
    <text x="328" y="278" font-weight="700" fill="#111827">~62.3 MB</text>
  </g>

  <text x="36" y="357" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">Read: the product path is clean, but process memory remains hundreds of MB larger than the named structural rows.</text>
</svg>

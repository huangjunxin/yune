<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Clean Track B post-M46 latency profile</title>
  <desc id="desc">Yune-only Track B guard rows show short-prefix rows as the latency-heavy cases: h is 1675.5 microseconds, ha 1143.1, hau 805.1, hai 778.0, ngo 581.4, nei 397.3, while the 50 plus guard is 32.4.</desc>
  <rect width="900" height="420" fill="#f8fafc"/>
  <text x="36" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Post-M46 clean Track B latency profile</text>
  <text x="36" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">Yune-only Jyutping product guard; not a cross-engine librime comparison</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#64748b">
    <line x1="160" y1="100" x2="160" y2="350" stroke="#cbd5e1"/>
    <line x1="319" y1="100" x2="319" y2="350" stroke="#e2e8f0"/>
    <line x1="478" y1="100" x2="478" y2="350" stroke="#e2e8f0"/>
    <line x1="637" y1="100" x2="637" y2="350" stroke="#e2e8f0"/>
    <line x1="797" y1="100" x2="797" y2="350" stroke="#e2e8f0"/>
    <text x="156" y="369">0</text>
    <text x="303" y="369">500</text>
    <text x="456" y="369">1,000</text>
    <text x="615" y="369">1,500</text>
    <text x="759" y="369">microseconds</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="13">
    <text x="58" y="125" fill="#111827">h</text>
    <rect x="160" y="108" width="533" height="22" rx="4" fill="#dc2626"/>
    <text x="706" y="125" font-weight="700" fill="#111827">1,675.5 us</text>

    <text x="58" y="160" fill="#111827">ha</text>
    <rect x="160" y="143" width="364" height="22" rx="4" fill="#ea580c"/>
    <text x="537" y="160" font-weight="700" fill="#111827">1,143.1 us</text>

    <text x="58" y="195" fill="#111827">hau</text>
    <rect x="160" y="178" width="256" height="22" rx="4" fill="#f59e0b"/>
    <text x="429" y="195" font-weight="700" fill="#111827">805.1 us</text>

    <text x="58" y="230" fill="#111827">hai</text>
    <rect x="160" y="213" width="248" height="22" rx="4" fill="#f59e0b"/>
    <text x="421" y="230" font-weight="700" fill="#111827">778.0 us</text>

    <text x="58" y="265" fill="#111827">ngo</text>
    <rect x="160" y="248" width="185" height="22" rx="4" fill="#2563eb"/>
    <text x="358" y="265" font-weight="700" fill="#111827">581.4 us</text>

    <text x="58" y="300" fill="#111827">nei</text>
    <rect x="160" y="283" width="126" height="22" rx="4" fill="#2563eb"/>
    <text x="299" y="300" font-weight="700" fill="#111827">397.3 us</text>

    <text x="58" y="335" fill="#111827">50+ guard</text>
    <rect x="160" y="318" width="10" height="22" rx="4" fill="#0f766e"/>
    <text x="184" y="335" font-weight="700" fill="#111827">32.4 us</text>
  </g>

  <text x="36" y="404" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">Read: the clean rerun keeps Track B as a product guard; the visible latency shape is short-prefix enumeration, not long-input throughput.</text>
</svg>

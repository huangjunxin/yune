<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Clean Track B post-M46 owner scale</title>
  <desc id="desc">Named Track B rows are about 62.3 MB, roughly 12.3 percent of the 504.7 MB peak working set, so the remaining process-scale memory is still mostly unclassified.</desc>
  <rect width="900" height="420" fill="#f8fafc"/>
  <text x="36" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Post-M46 owner scale: named rows are not the headline</text>
  <text x="36" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#475569">Scale view against the clean Track B peak working set; owner rows include required, mmap, guarded, reducible, and overlapping classes.</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="54" y="120" font-size="13" fill="#111827">Peak working set</text>
    <rect x="190" y="100" width="620" height="34" rx="5" fill="#e2e8f0"/>
    <rect x="190" y="100" width="76" height="34" rx="5" fill="#7c3aed"/>
    <text x="202" y="122" font-size="13" font-weight="700" fill="#ffffff">12.3%</text>
    <text x="786" y="122" font-size="13" font-weight="700" text-anchor="end" fill="#111827">504.7 MB total</text>

    <rect x="556" y="154" width="16" height="16" fill="#7c3aed"/>
    <text x="580" y="167" font-size="13" fill="#111827">named rows, mixed classes: ~62.3 MB</text>
    <rect x="556" y="180" width="16" height="16" fill="#e2e8f0" stroke="#cbd5e1"/>
    <text x="580" y="193" font-size="13" fill="#111827">remaining scale: allocator, runtime, mappings, overlap, and still-unclassified memory</text>
  </g>

  <text x="54" y="228" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Largest named rows</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="13">
    <text x="54" y="262" fill="#111827">lookup records</text>
    <rect x="230" y="245" width="320" height="20" rx="4" fill="#2563eb"/>
    <text x="562" y="261" font-weight="700" fill="#111827">31.9 MB</text>

    <text x="54" y="294" fill="#111827">mmap table storage</text>
    <rect x="230" y="277" width="153" height="20" rx="4" fill="#0f766e"/>
    <text x="395" y="293" font-weight="700" fill="#111827">15.2 MB</text>

    <text x="54" y="326" fill="#111827">translator entries</text>
    <rect x="230" y="309" width="84" height="20" rx="4" fill="#f59e0b"/>
    <text x="326" y="325" font-weight="700" fill="#111827">8.3 MB</text>

    <text x="54" y="358" fill="#111827">code strings</text>
    <rect x="230" y="341" width="42" height="20" rx="4" fill="#a855f7"/>
    <text x="284" y="357" font-weight="700" fill="#111827">4.2 MB</text>

    <text x="54" y="390" fill="#111827">text/comment payloads</text>
    <rect x="230" y="373" width="26" height="20" rx="4" fill="#64748b"/>
    <text x="268" y="389" font-weight="700" fill="#111827">2.6 MB</text>
  </g>
</svg>

<svg viewBox="0 0 680 290" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Latency ratio Yune divided by librime: zhongguo 0.33x, startup 0.92x, session 0.94x are faster than librime; 59-char 1.32x, 37-char 1.77x, hao 3.28x, ni 3.86x are slower but within the 5x gate.">
  <style>
    .t{fill:#1f1f1d;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
    .s{fill:#5f5e5a;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
  </style>
  <text x="0" y="16" class="t" font-size="13" font-weight="600">Latency: Yune ÷ librime  ·  left of the dashed line = Yune faster</text>

  <line x1="185" y1="40" x2="185" y2="278" stroke="#c3c2b7" stroke-width="1"/>
  <line x1="255" y1="38" x2="255" y2="282" stroke="#5f5e5a" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="535" y1="38" x2="535" y2="282" stroke="#a32d2d" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="255" y="34" text-anchor="middle" class="s" font-size="11">1.0× parity</text>
  <text x="535" y="34" text-anchor="middle" class="s" font-size="11">5× gate</text>

  <text x="178" y="62" text-anchor="end" class="t" font-size="12">zhongguo</text>
  <rect x="185" y="50" width="23" height="19" rx="2" fill="#1d9e75"/>
  <text x="214" y="64" class="t" font-size="12">0.33×</text>

  <text x="178" y="95" text-anchor="end" class="t" font-size="12">startup</text>
  <rect x="185" y="83" width="64" height="19" rx="2" fill="#1d9e75"/>
  <text x="255" y="97" class="t" font-size="12">0.92×</text>

  <text x="178" y="128" text-anchor="end" class="t" font-size="12">session</text>
  <rect x="185" y="116" width="66" height="19" rx="2" fill="#1d9e75"/>
  <text x="257" y="130" class="t" font-size="12">0.94×</text>

  <text x="178" y="161" text-anchor="end" class="t" font-size="12">59-char input</text>
  <rect x="185" y="149" width="92" height="19" rx="2" fill="#ba7517"/>
  <text x="283" y="163" class="t" font-size="12">1.32×</text>

  <text x="178" y="194" text-anchor="end" class="t" font-size="12">37-char input</text>
  <rect x="185" y="182" width="124" height="19" rx="2" fill="#ba7517"/>
  <text x="315" y="196" class="t" font-size="12">1.77×</text>

  <text x="178" y="227" text-anchor="end" class="t" font-size="12">hao</text>
  <rect x="185" y="215" width="230" height="19" rx="2" fill="#ba7517"/>
  <text x="421" y="229" class="t" font-size="12">3.28×</text>

  <text x="178" y="260" text-anchor="end" class="t" font-size="12">ni</text>
  <rect x="185" y="248" width="270" height="19" rx="2" fill="#ba7517"/>
  <text x="461" y="262" class="t" font-size="12">3.86×</text>
</svg>

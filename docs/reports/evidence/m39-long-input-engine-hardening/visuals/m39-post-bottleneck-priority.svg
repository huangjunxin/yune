<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Post-M39 bottleneck priority map</title>
  <desc id="desc">A log-scale comparison showing post-M39 yune-web jyut6ping3 readiness at about 10.6 seconds, jyut6ping3 input gate at about 9.8 seconds, yune-web luna_pinyin readiness at about 3.4 seconds, luna_pinyin input gate at about 2.5 seconds, Cantonese long typing probe rendering at about 1.7 seconds, native product startup at 138.5 milliseconds, hai at 22.3 milliseconds total, and Track A native startup at 25.0 milliseconds.</desc>
  <rect width="960" height="520" fill="#ffffff"/>
  <text x="32" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Post-M39 bottleneck priority</text>
  <text x="32" y="64" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#4b5563">Log-scale duration view. Browser rows use corrected YWEB01 post-M39 baselines for both jyut6ping3 and luna_pinyin.</text>

  <line x1="292" y1="456" x2="880" y2="456" stroke="#d1d5db" stroke-width="1"/>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#6b7280">
    <text x="288" y="478">0.1 ms</text>
    <text x="412" y="478">1 ms</text>
    <text x="534" y="478">10 ms</text>
    <text x="654" y="478">100 ms</text>
    <text x="778" y="478">1 s</text>
    <text x="864" y="478">10 s</text>
  </g>
  <g stroke="#e5e7eb" stroke-width="1">
    <line x1="292" y1="82" x2="292" y2="456"/>
    <line x1="416" y1="82" x2="416" y2="456"/>
    <line x1="538" y1="82" x2="538" y2="456"/>
    <line x1="660" y1="82" x2="660" y2="456"/>
    <line x1="782" y1="82" x2="782" y2="456"/>
    <line x1="880" y1="82" x2="880" y2="456"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">
    <text x="32" y="106" font-weight="600">yune-web jyut6ping3 ready</text>
    <text x="32" y="150" font-weight="600">yune-web jyut6ping3 gate</text>
    <text x="32" y="194" font-weight="600">yune-web luna_pinyin ready</text>
    <text x="32" y="238" font-weight="600">yune-web luna_pinyin gate</text>
    <text x="32" y="282" font-weight="600">jyut6 long typing probe</text>
    <text x="32" y="326" font-weight="600">Track B native startup</text>
    <text x="32" y="370" font-weight="600">Track B hai total</text>
    <text x="32" y="414" font-weight="600">Track A native startup</text>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#4b5563">
    <text x="32" y="124">10.605 s tracked-app cold baseline</text>
    <text x="32" y="168">9.838 s after worker startup marker</text>
    <text x="32" y="212">3.365 s tracked-app cold baseline</text>
    <text x="32" y="256">2.535 s after worker startup marker</text>
    <text x="32" y="300">1.708 s total string paint, mock close</text>
    <text x="32" y="344">138.513 ms median</text>
    <text x="32" y="388">22.271 ms for 3 keys</text>
    <text x="32" y="432">25.048 ms median</text>
  </g>

  <rect x="292" y="90" width="588" height="24" rx="4" fill="#b91c1c"/>
  <rect x="292" y="134" width="586" height="24" rx="4" fill="#dc2626"/>
  <rect x="292" y="178" width="532" height="24" rx="4" fill="#ef4444"/>
  <rect x="292" y="222" width="518" height="24" rx="4" fill="#f97316"/>
  <rect x="292" y="266" width="498" height="24" rx="4" fill="#f59e0b"/>
  <rect x="292" y="310" width="369" height="24" rx="4" fill="#f97316"/>
  <rect x="292" y="354" width="276" height="24" rx="4" fill="#84cc16"/>
  <rect x="292" y="398" width="282" height="24" rx="4" fill="#22c55e"/>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="12">
    <text x="692" y="107" fill="#ffffff">largest visible startup delay</text>
    <text x="690" y="151" fill="#ffffff">Cantonese post-worker gate</text>
    <text x="832" y="195" fill="#111827">light-schema baseline</text>
    <text x="818" y="239" fill="#111827">light-schema gate</text>
    <text x="798" y="283" fill="#111827">mostly browser typing cadence</text>
    <text x="668" y="327" fill="#111827">native profile lifecycle</text>
    <text x="576" y="371" fill="#111827">short-prefix engine typing</text>
    <text x="582" y="415" fill="#111827">librime-level Track A startup</text>
  </g>
</svg>

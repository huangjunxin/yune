<svg viewBox="0 0 680 232" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Long-input latency after M39: 37-char Yune 0.515 ms vs librime 0.292 ms (was 452 ms, 878x faster); 59-char Yune 0.918 ms vs librime 0.696 ms (was 1.24 s, 1351x faster).">
  <style>
    .t{fill:#1f1f1d;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
    .s{fill:#5f5e5a;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
    .r{fill:#a32d2d;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
  </style>
  <text x="0" y="16" class="t" font-size="13" font-weight="600">Long input now ≈ librime — the stall before M39 is gone</text>

  <line x1="185" y1="34" x2="185" y2="210" stroke="#c3c2b7" stroke-width="1"/>
  <line x1="422" y1="34" x2="422" y2="210" stroke="#e1e0d9" stroke-width="1"/>
  <text x="422" y="226" text-anchor="middle" class="s" font-size="10">0.5 ms</text>
  <text x="185" y="226" text-anchor="middle" class="s" font-size="10">0</text>

  <text x="178" y="58" text-anchor="end" class="t" font-size="12">37-char · Yune</text>
  <rect x="185" y="46" width="244" height="18" rx="2" fill="#ba7517"/>
  <text x="435" y="60" class="t" font-size="12">0.515 ms</text>

  <text x="178" y="82" text-anchor="end" class="s" font-size="12">37-char · librime</text>
  <rect x="185" y="70" width="138" height="18" rx="2" fill="#b4b2a9"/>
  <text x="329" y="84" class="s" font-size="12">0.292 ms</text>

  <text x="185" y="106" class="r" font-size="11">was 452 ms before M39  —  ≈ 878× faster</text>

  <text x="178" y="142" text-anchor="end" class="t" font-size="12">59-char · Yune</text>
  <rect x="185" y="130" width="435" height="18" rx="2" fill="#ba7517"/>
  <text x="585" y="124" text-anchor="end" class="t" font-size="12">0.918 ms</text>

  <text x="178" y="166" text-anchor="end" class="s" font-size="12">59-char · librime</text>
  <rect x="185" y="154" width="330" height="18" rx="2" fill="#b4b2a9"/>
  <text x="521" y="168" class="s" font-size="12">0.696 ms</text>

  <text x="185" y="192" class="r" font-size="11">was 1.24 s before M39  —  ≈ 1,351× faster</text>
</svg>

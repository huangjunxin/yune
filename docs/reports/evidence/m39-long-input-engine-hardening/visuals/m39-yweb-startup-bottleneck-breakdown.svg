<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">YWEB01 post-M39 startup bottleneck breakdown</title>
  <desc id="desc">A stacked horizontal bar chart comparing yune-web luna_pinyin and jyut6ping3 ready-to-input time. The chart shows worker startup marker time and the post-worker input gate. The jyut6ping3 rows are around 9.7 to 10.6 seconds ready, mostly the post-worker input gate, while luna_pinyin rows are around 2.7 to 3.4 seconds ready, also mostly the post-worker input gate.</desc>
  <rect width="980" height="500" fill="#ffffff"/>
  <text x="32" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">YWEB01 startup bottleneck breakdown</text>
  <text x="32" y="64" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#4b5563">Tracked-app production build, post-M39 WASM artifacts, Chromium 149.0.7827.55. Longer bars are slower.</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="12">
    <rect x="628" y="26" width="14" height="14" rx="2" fill="#2563eb"/>
    <text x="648" y="38" fill="#374151">worker startup marker</text>
    <rect x="780" y="26" width="14" height="14" rx="2" fill="#dc2626"/>
    <text x="800" y="38" fill="#374151">post-worker input gate</text>
  </g>

  <line x1="300" y1="410" x2="900" y2="410" stroke="#d1d5db" stroke-width="1"/>
  <g stroke="#e5e7eb" stroke-width="1">
    <line x1="300" y1="104" x2="300" y2="410"/>
    <line x1="413" y1="104" x2="413" y2="410"/>
    <line x1="526" y1="104" x2="526" y2="410"/>
    <line x1="639" y1="104" x2="639" y2="410"/>
    <line x1="752" y1="104" x2="752" y2="410"/>
    <line x1="865" y1="104" x2="865" y2="410"/>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#6b7280">
    <text x="294" y="432">0s</text>
    <text x="405" y="432">2s</text>
    <text x="518" y="432">4s</text>
    <text x="631" y="432">6s</text>
    <text x="744" y="432">8s</text>
    <text x="854" y="432">10s</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#111827">
    <text x="32" y="123" font-weight="600">jyut6ping3 cold</text>
    <text x="32" y="171" font-weight="600">jyut6ping3 warm reload</text>
    <text x="32" y="219" font-weight="600">jyut6ping3 warm new page</text>
    <text x="32" y="283" font-weight="600">luna_pinyin cold</text>
    <text x="32" y="331" font-weight="600">luna_pinyin warm reload</text>
    <text x="32" y="379" font-weight="600">luna_pinyin warm new page</text>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#4b5563">
    <text x="32" y="141">ready 10.605s, gate 9.838s</text>
    <text x="32" y="189">ready 9.690s, gate 9.118s</text>
    <text x="32" y="237">ready 10.379s, gate 9.708s</text>
    <text x="32" y="301">ready 3.365s, gate 2.535s</text>
    <text x="32" y="349">ready 2.692s, gate 1.987s</text>
    <text x="32" y="397">ready 2.757s, gate 2.028s</text>
  </g>

  <rect x="300" y="108" width="43" height="24" rx="3" fill="#2563eb"/>
  <rect x="343" y="108" width="556" height="24" rx="3" fill="#dc2626"/>
  <rect x="300" y="156" width="31" height="24" rx="3" fill="#2563eb"/>
  <rect x="331" y="156" width="516" height="24" rx="3" fill="#dc2626"/>
  <rect x="300" y="204" width="39" height="24" rx="3" fill="#2563eb"/>
  <rect x="339" y="204" width="549" height="24" rx="3" fill="#dc2626"/>

  <rect x="300" y="268" width="47" height="24" rx="3" fill="#2563eb"/>
  <rect x="347" y="268" width="143" height="24" rx="3" fill="#f97316"/>
  <rect x="300" y="316" width="40" height="24" rx="3" fill="#2563eb"/>
  <rect x="340" y="316" width="112" height="24" rx="3" fill="#f97316"/>
  <rect x="300" y="364" width="41" height="24" rx="3" fill="#2563eb"/>
  <rect x="341" y="364" width="115" height="24" rx="3" fill="#f97316"/>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#111827">
    <text x="908" y="125">92.8% gate</text>
    <text x="856" y="173">94.1% gate</text>
    <text x="897" y="221">93.5% gate</text>
    <text x="500" y="285">75.3% gate</text>
    <text x="462" y="333">73.8% gate</text>
    <text x="466" y="381">73.6% gate</text>
  </g>

  <text x="32" y="462" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#4b5563">Interpretation: native M39 startup is not the seconds-scale owner. The next web milestone should split the post-worker input gate before optimizing.</text>
</svg>

<svg viewBox="0 0 680 168" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Peak working set: librime luna 14 MB versus Yune luna 118 MB, 8.4 times larger. Yune product jyut6ping3 peak is 504 MB on a separate schema with no librime peer.">
  <style>
    .t{fill:#1f1f1d;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
    .s{fill:#5f5e5a;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
  </style>
  <text x="0" y="16" class="t" font-size="13" font-weight="600">Peak working set — the gap latency parity hides</text>

  <line x1="185" y1="34" x2="185" y2="108" stroke="#c3c2b7" stroke-width="1"/>

  <text x="178" y="55" text-anchor="end" class="t" font-size="12">librime · luna</text>
  <rect x="185" y="42" width="50" height="22" rx="2" fill="#b4b2a9"/>
  <text x="241" y="57" class="t" font-size="12">14 MiB</text>

  <text x="178" y="89" text-anchor="end" class="t" font-size="12">Yune · luna</text>
  <rect x="185" y="76" width="425" height="22" rx="2" fill="#e24b4a"/>
  <text x="193" y="91" font-size="12" fill="#ffffff">118 MiB</text>
  <text x="616" y="91" class="t" font-size="12">8.4×</text>

  <text x="0" y="138" class="s" font-size="11">Product (jyut6ping3) peak: 481 MiB — separate schema, no librime peer, still unoptimized.</text>
</svg>

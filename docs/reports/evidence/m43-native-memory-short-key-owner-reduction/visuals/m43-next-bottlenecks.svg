<svg xmlns="http://www.w3.org/2000/svg" width="980" height="490" viewBox="0 0 980 490" role="img" aria-labelledby="title desc">
  <title id="title">Post-M43 remaining native blockers</title>
  <desc id="desc">Ranked remaining native blockers after M43.</desc>
  <rect width="980" height="490" fill="#f8fafc"/>
<text x="40" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827" text-anchor="start">Post-M43 remaining native blockers</text>
<text x="40" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" fill="#475569" text-anchor="start">M43 moves one retained owner. The next work needs a new scoped target and fresh owner evidence.</text>
<rect x="40" y="105" width="900.0" height="58" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<rect x="40" y="105" width="8.0" height="58" rx="4" fill="#dc2626"/>
<text x="65" y="130" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#dc2626" text-anchor="start">1</text>
<text x="105" y="129" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#111827" text-anchor="start">Whole-process memory</text>
<text x="105" y="151" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" fill="#475569" text-anchor="start">Owner drop did not move peak enough. Final peak ~127.5 MB; target &lt;=107.8 MB.</text>
<rect x="40" y="187" width="900.0" height="58" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<rect x="40" y="187" width="8.0" height="58" rx="4" fill="#d97706"/>
<text x="65" y="212" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#d97706" text-anchor="start">2</text>
<text x="105" y="211" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#111827" text-anchor="start">Abbreviation latency</text>
<text x="105" y="233" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" fill="#475569" text-anchor="start">Behavior matches oracle; graph/search is slow. cszysmsrsd 3.479x, zybfshmsru 5.299x.</text>
<rect x="40" y="269" width="900.0" height="58" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<rect x="40" y="269" width="8.0" height="58" rx="4" fill="#2563eb"/>
<text x="65" y="294" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#2563eb" text-anchor="start">3</text>
<text x="105" y="293" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#111827" text-anchor="start">Short-key fixed overhead</text>
<text x="105" y="315" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" fill="#475569" text-anchor="start">Translator production remains dominant. hao 3.390x, ni 4.096x.</text>
<rect x="40" y="351" width="900.0" height="58" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
<rect x="40" y="351" width="8.0" height="58" rx="4" fill="#64748b"/>
<text x="65" y="376" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#64748b" text-anchor="start">4</text>
<text x="105" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#111827" text-anchor="start">Track B profile path</text>
<text x="105" y="397" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" fill="#475569" text-anchor="start">Guard only; no TypeDuck speed claim. Track B guard 182.780 us/op.</text>
<text x="40" y="460" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#475569" text-anchor="start">Boundary: native engine only; no browser, product delivery, or TypeDuck-profile speed claims.</text>
</svg>

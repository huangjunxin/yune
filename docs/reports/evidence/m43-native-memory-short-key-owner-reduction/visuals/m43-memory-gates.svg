<svg xmlns="http://www.w3.org/2000/svg" width="980" height="470" viewBox="0 0 980 470" role="img" aria-labelledby="title desc">
  <title id="title">M43 Track A peak memory gates</title>
  <desc id="desc">Peak memory bands against M43 and M42 memory gates.</desc>
  <rect width="980" height="470" fill="#f8fafc"/>
<text x="40" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827" text-anchor="start">M43 Track A peak memory gates</text>
<text x="40" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" fill="#475569" text-anchor="start">Final peak stays in Phase 0 noise, but misses the whole-process memory-win target and M42 +5% ceiling.</text>
<line x1="190" y1="148" x2="910" y2="148" stroke="#94a3b8" stroke-width="2"/>
<line x1="273.93124" y1="112" x2="273.93124" y2="275" stroke="#16a34a" stroke-width="2" stroke-dasharray="5 4"/>
<text x="273.93124" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#16a34a" text-anchor="middle">M43 memory-win target 107.8 MB</text>
<line x1="812.9198200000001" y1="112" x2="812.9198200000001" y2="275" stroke="#dc2626" stroke-width="2" stroke-dasharray="5 4"/>
<text x="812.9198200000001" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#dc2626" text-anchor="middle">M42 +5% ceiling 125.8 MB</text>
<text x="40" y="166" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#111827" text-anchor="start">Phase 0 peak band</text>
<rect x="867.22048" y="148" width="3.0" height="24" rx="4" fill="#64748b"/>
<text x="879.43232" y="166" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" fill="#111827" text-anchor="start">127.57-127.65 MB</text>
<text x="40" y="226" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#111827" text-anchor="start">Final peak band</text>
<rect x="864.76288" y="208" width="4.1" height="24" rx="4" fill="#2563eb"/>
<text x="878.81792" y="226" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" fill="#111827" text-anchor="start">127.49-127.63 MB</text>
<rect x="40" y="320" width="900.0" height="70" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
<text x="64" y="350" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#9a3412" text-anchor="start">Conclusion: partial structural reduction only</text>
<text x="64" y="374" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" fill="#9a3412" text-anchor="start">Peak memory is stable, not reduced to the M43 win threshold. Another owner pass is required.</text>
<text x="40" y="440" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#475569" text-anchor="start">Source: final-native-benchmark/noise-band-summary.csv and phase-0-baseline/noise-band-summary.csv.</text>
</svg>

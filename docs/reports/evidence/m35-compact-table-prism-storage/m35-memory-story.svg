<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc">
<title id="title">M35 memory: local win, process peak still high</title>
<desc id="desc">Dictionary-specific memory drops sharply, but the fair whole-process peak remains about 8x librime.</desc>
<rect x="0.00" y="0.00" width="1040.00" height="520.00" rx="0" fill="#ffffff" />
<text x="28" y="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="start" fill="#0f172a">M35 memory: local win, process peak still high</text>
<text x="28" y="57" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="start" fill="#475569">Dictionary-specific memory drops sharply, but the fair whole-process peak remains about 8x librime.</text>
<text x="28" y="92" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="start" fill="#0f172a">Dictionary/startup owner deltas</text>
<text x="28" y="112" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start" fill="#475569">M35 removes expanded alias memory and cuts translator install delta.</text>
<text x="28" y="166" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" text-anchor="start" fill="#0f172a">spelling algebra delta</text>
<rect x="250.00" y="145.00" width="146.80" height="18.00" rx="3" fill="#2563eb" />
<rect x="250.00" y="173.00" width="2.00" height="18.00" rx="3" fill="#16a34a" />
<text x="574" y="159" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start" fill="#2563eb">17.0 MiB</text>
<text x="574" y="187" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start" fill="#16a34a">0.0 MiB</text>
<text x="28" y="256" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" text-anchor="start" fill="#0f172a">translator install delta</text>
<rect x="250.00" y="235.00" width="310.00" height="18.00" rx="3" fill="#2563eb" />
<rect x="250.00" y="263.00" width="81.08" height="18.00" rx="3" fill="#16a34a" />
<text x="574" y="249" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start" fill="#2563eb">35.8 MiB</text>
<text x="574" y="277" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start" fill="#16a34a">9.4 MiB</text>
<text x="250" y="355" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start" fill="#475569">blue = before; green = after</text>
<line x1="620" y1="88" x2="620" y2="455" stroke="#e2e8f0" stroke-width="1" />
<text x="650" y="92" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="start" fill="#0f172a">Whole-process peak remains unresolved</text>
<text x="650" y="112" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start" fill="#475569">The fair harness high-water barely moves after dictionary-local savings.</text>
<text x="650" y="150" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="start" fill="#334155">final M35 after-run peak</text>
<rect x="650.00" y="170.00" width="310.00" height="24.00" rx="3" fill="#2563eb" />
<text x="650" y="162" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" text-anchor="start" fill="#0f172a">Yune</text>
<text x="972" y="188" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start" fill="#2563eb">174.0 MiB</text>
<rect x="650.00" y="240.00" width="37.98" height="24.00" rx="3" fill="#64748b" />
<text x="650" y="232" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" text-anchor="start" fill="#0f172a">librime</text>
<text x="699.9792106326613" y="258" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start" fill="#64748b">21.3 MiB</text>
<text x="650" y="330" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="start" fill="#dc2626">Yune peak is 8.2x librime despite the dictionary-local win.</text>
<text x="650" y="358" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" text-anchor="start" fill="#475569">This is why M35 closes mmap/borrowed storage by no-go, not by victory.</text>
</svg>
